<!DOCTYPE html>
<html lang="ha">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ytdlp ui</title>
    <link rel="stylesheet" href="https://bootswatch.com/5/flatly/bootstrap.min.css">
    </link>

    <style>
        #loading {
            background: rgba(0, 0, 0, .5);
            z-index: 10000;
        }
    </style>

</head>

<body>

    <div class="navbar navbar-expand-lg fixed-top bg-primary" data-bs-theme="dark">
        <div class="container">
            <a href="#" class="navbar-brand">ytdlp ui</a>
        </div>
    </div>

    <div id="loading" class="top-0 start-0 w-100 h-100" style="position: fixed;">
        <div class="text-center position-absolute top-50 start-50 w-100 translate-middle">
            <div class="spinner-border text-light" role="status">
                <span class="sr-only"></span>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 100px;" id="container">
        <div class="row">
            <div class="col">
                <form onsubmit="return submit_input();">
                    <div>
                        <label for="url-input" class="form-label mt-4">URL</label>
                        <input type="url" class="form-control" id="url-input" name="url-input"
                            placeholder="Enter url...">
                    </div>
                    <div>
                        <label for="preset-select" class="form-label mt-4">Preset</label>
                        <select class="form-select" id="preset-select" name="preset-select">
                        </select>
                    </div>

                    <br />
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>

        <div class="row" style="margin-top: 30px;">
            <div class="col">
                <h4>Processes</h4>
                <div class="list-group" id="process-list-group">

                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="messageModal" tabindex="-1" aria-labelledby="messageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="messageModalLabel">Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="messageModalMessage" style="text-align: center;">
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="processModal" tabindex="-1" aria-labelledby="processModal" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="processModalLabel"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea id="processModalData" style="width: 100%;" readonly="readonly" rows="10"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
